<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mindfulness of Breathing & Four Elements Meditation — Minimal Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,450;9..144,650&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" />
  <style>
:root{
  --bg:#07070e;
  --panel:rgba(10,10,20,0.97);
  --ink:rgba(255,255,255,0.78);
  --muted:rgba(255,255,255,0.42);
  --faint:rgba(255,255,255,0.18);
  --line:rgba(255,255,255,0.08);
  --line-strong:rgba(255,255,255,0.14);
  --accent:rgba(255,255,255,0.65);
  --accent-soft:rgba(255,255,255,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg)}
body{
  font-family:"IBM Plex Sans",-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
#app{
  width:100%;max-width:none;min-height:100svh;min-height:100dvh;margin:0 auto;background:var(--bg);
  display:flex;flex-direction:column;position:relative;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}

/* Bottom-right portal */
#lattyPortal{
  position:absolute;
  right:calc(14px + env(safe-area-inset-right));
  bottom:calc(14px + env(safe-area-inset-bottom));
  width:66px;
  height:66px;
  opacity:0.22;
  pointer-events:auto;
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  filter:drop-shadow(0 10px 24px rgba(0,0,0,0.55));
  z-index:70;
}

#lattyPortal img{display:block;width:100%;height:100%;object-fit:contain}

#lattyPortal:active{transform:none}
.screen{display:none;flex:1;position:relative}
.screen.active{display:flex}
#home-screen{
  flex-direction:column;align-items:center;justify-content:flex-start;
  padding:calc(14px + env(safe-area-inset-top)) 16px calc(96px + env(safe-area-inset-bottom));
  touch-action:none;cursor:pointer;
}
#home-canvas-wrap{
  width:min(58vw,240px);height:min(58vw,240px);margin-top:2px;position:relative;left:auto;top:auto;transform:none;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
canvas{display:block;width:100%;height:100%}
#center-readout{display:none !important}
#center-readout{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;text-align:center;
}
#count-prev,#count-next{
  position:absolute;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:-.04em;color:rgba(255,255,255,.12);font-weight:540;
}
#count-prev{top:70px}
#count-next{bottom:70px}
#count-main{font-size:72px;line-height:.9;letter-spacing:-.08em;font-weight:700;color:rgba(255,255,255,0.72)}
#count-sub{margin-top:6px;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,0.22)}
#count-progress{margin-top:6px;font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,0.38)}

#bottom-zone{margin-top:8px;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%}

.flex-spacer{display:none}

#tempo-row{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap}
.tempo-btn{
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.02);
  color:rgba(255,255,255,0.55);
  padding:8px 10px;
  border-radius:999px;
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  cursor:pointer;
}
.tempo-btn.active{border-color:rgba(255,255,255,0.22);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.72)}
.tempo-btn:active{transform:scale(0.98)}

#full-instructions{
  width:min(92vw, 860px);
  color:rgba(255,255,255,0.34);
  font-size:13px;
  line-height:1.65;
  letter-spacing:0.01em;
  padding:14px 14px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.02);
  max-height:min(72vh, 860px);
  overflow:auto;
}

.inst-aim{color:rgba(255,255,255,0.36);margin-bottom:10px}
.inst-aim .k{color:var(--accent);letter-spacing:0.10em;text-transform:uppercase;font-size:11px}
.inst-title{font-family:"Fraunces",serif;font-optical-sizing:auto;letter-spacing:-0.01em;font-size:16px;color:rgba(255,255,255,0.72);margin:0 0 10px}
.inst-h{margin:16px 0 8px;color:rgba(255,255,255,0.26);letter-spacing:0.14em;font-size:10px}
.inst-p{margin:0 0 8px}
.inst-cta{margin-top:10px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,0.22)}
.inst-ref{margin-top:14px}
.inst-tag{font-size:11px;letter-spacing:0.10em}
.inst-tag.good{color:rgba(70,170,110,0.78)}
.inst-tag.bad{color:rgba(210,80,80,0.78)}
.inst-tag.adv{color:rgba(172,128,255,0.80)}

#home-hint{display:none !important}

/* Bottom dock */
#dock{
  position:fixed;
  left:50%;
  bottom:calc(14px + env(safe-area-inset-bottom));
  transform:translateX(-50%);
  z-index:60;
  width:min(92vw, 560px);
  display:grid;
  grid-template-columns:44px 1fr 44px 84px;
  align-items:center;
  gap:8px;
  padding:10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.04);
  box-shadow:0 18px 45px rgba(0,0,0,0.32);
  backdrop-filter:blur(12px);
  touch-action:manipulation;
}
.dock-btn{
  height:36px;
  min-width:44px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.72);
  cursor:pointer;
  padding:0 10px;
  font-size:14px;
  line-height:36px;
}
.dock-btn:disabled{opacity:0.35;cursor:default}
.dock-mid{
  display:inline-flex;
  align-items:center;
  gap:8px;
  height:36px;
  width:100%;
  padding:0 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.52);
  font-size:12px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  cursor:pointer;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.dock-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.55);box-shadow:0 0 0 6px rgba(255,255,255,0.06)}

#dock-scrim{
  position:fixed;
  inset:0;
  z-index:55;
  background:rgba(0,0,0,0.25);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.18s ease;
}
#dock-scrim.open{opacity:1;pointer-events:auto}

#dock-picker{
  position:fixed;
  left:50%;
  bottom:calc(14px + env(safe-area-inset-bottom) + 58px);
  transform:translateX(-50%) translateY(10px);
  z-index:60;
  width:min(92vw,560px);
  max-height:min(60vh,520px);
  overflow:auto;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(12,12,22,0.92);
  box-shadow:0 22px 60px rgba(0,0,0,0.42);
  backdrop-filter:blur(14px);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.18s ease, transform 0.18s ease;
}
#dock-picker.open{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.picker-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.08)}
.picker-head .k{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.36)}
.picker-head .h{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.22)}
.picker-item{width:100%;display:block;text-align:left;padding:12px;border:0;background:transparent;color:inherit;cursor:pointer}
.picker-item:hover{background:rgba(255,255,255,0.04)}
.picker-row{display:grid;grid-template-columns:56px 1fr;gap:10px;align-items:start}
.picker-k{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.28)}
.picker-title{font-size:14px;line-height:1.25;color:rgba(255,255,255,0.72)}
.picker-sub{margin-top:4px;font-size:12px;line-height:1.5;color:rgba(255,255,255,0.36)}
#meditation-strip{
  display:flex;align-items:center;gap:8px;max-width:100%;padding:8px 12px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,0.04);backdrop-filter:blur(10px);
}
#meditation-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.45);box-shadow:0 0 0 6px rgba(255,255,255,0.06);flex-shrink:0}
#meditation-label{font-size:11px;line-height:1.2;color:rgba(255,255,255,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72vw}
#home-hint{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,0.18)}
#nav-dot-wrap{position:fixed;left:50%;bottom:calc(14px + env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;justify-content:center;width:auto;pointer-events:all;z-index:80}
#nav-dot{
  width:50px;height:50px;border-radius:50%;border:2px solid rgba(255,255,255,.22);background:transparent;cursor:pointer;
}
#nav-dot:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.38)}

#info-scrim{
  position:fixed;inset:0;z-index:72;
  background:rgba(0,0,0,0.42);
  opacity:0;
  pointer-events:none;
  transition:opacity .22s ease;
  backdrop-filter:blur(2px);
}
#info-scrim.open{opacity:1;pointer-events:auto}

#info-popup{
  position:fixed;left:0;right:0;bottom:0;z-index:75;transform:translateY(104%);
  transition:transform .34s cubic-bezier(.32,.72,0,1);
  background:var(--panel);border-top:1px solid var(--line-strong);border-radius:20px 20px 0 0;
  padding:20px 18px calc(30px + env(safe-area-inset-bottom));
  max-height:calc(100svh - 22px);
  overflow-y:auto;
  overscroll-behavior:contain;
  box-shadow:0 -18px 40px rgba(0,0,0,.34);
}
#info-popup.open{transform:translateY(0)}
#info-drag-bar{width:34px;height:4px;border-radius:99px;background:rgba(255,255,255,.12);margin:0 auto 16px}
#info-stage{font-size:10px;letter-spacing:.20em;text-transform:uppercase;color:rgba(255,255,255,0.44);margin-bottom:8px}
#info-title{font-size:28px;line-height:.98;letter-spacing:-.05em;font-weight:670;margin-bottom:10px;color:rgba(255,255,255,0.78)}
#info-subtitle{font-size:13px;line-height:1.55;color:rgba(255,255,255,0.46);margin-bottom:16px}
.info-block{padding:12px 0;border-top:1px solid var(--line)}
.info-block:first-of-type{border-top:none;padding-top:0}
.info-heading{font-size:9px;letter-spacing:.20em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:6px}
.info-body{font-size:13px;line-height:1.62;color:rgba(255,255,255,.56);overflow-wrap:anywhere}
.info-body ul{padding-left:18px}
.info-body li+li{margin-top:8px}
#info-refs{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.info-chip{display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);font-size:11px;line-height:1.1;border:1px solid rgba(255,255,255,0.08)}
.info-chip:visited{color:rgba(255,255,255,0.5)}
.info-chip:hover{border-color:rgba(255,255,255,0.16);background:rgba(255,255,255,0.08)}

#list-screen{flex-direction:column;overflow-y:auto;padding-bottom:calc(180px + env(safe-area-inset-bottom));}
#list-header{
  display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;position:sticky;top:0;
  background:linear-gradient(180deg, rgba(7,7,14,.96), rgba(7,7,14,.86));backdrop-filter:blur(10px);z-index:4;
}
#list-header span{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.22)}
#list-wrap{padding:0 16px calc(180px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:14px}
.group{border-top:1px solid var(--line);padding-top:10px}
.group-title{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:10px}
.card-list{display:flex;flex-direction:column;gap:8px}
.tech-card{
  padding:12px 12px 11px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.03);
  display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:border-color .2s, background .2s, transform .2s;
}
.tech-card:hover{border-color:rgba(255,255,255,0.16);background:rgba(255,255,255,0.05)}
.tech-card.selected{border-color:var(--accent);background:var(--accent-soft)}
.card-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.card-copy{min-width:0}
.card-stage{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.24);margin-bottom:3px}
.card-name{font-size:15px;line-height:1.2;font-weight:610;color:rgba(255,255,255,.72);margin-bottom:4px}
.card-subtitle{font-size:12px;line-height:1.45;color:rgba(255,255,255,.38)}

.hidden{display:none !important}

/* Accent serif moments */
.dock-mid,
#info-title,
.card-name{
  font-family:"Fraunces",serif;
  font-optical-sizing:auto;
  letter-spacing:-0.01em;
}

/* Allow selection inside long notes */
#full-instructions,
#info-popup{ user-select:text; -webkit-user-select:text; }
</style>
</head>
<body>
<div id="app">
  <div id="home-screen" class="screen active">
    <div id="home-canvas-wrap">
      <canvas id="home-canvas" width="240" height="240"></canvas>
      <div id="center-readout">
        <div id="count-prev"></div>
        <div id="count-main">1</div>
        <div id="count-next"></div>
        <div id="count-sub">breaths</div>
        <div id="count-progress"></div>
      </div>
    </div>

    <div id="bottom-zone">
      <div id="tempo-row" aria-label="Breath count">
        <button class="tempo-btn" data-count="10">10</button>
        <button class="tempo-btn" data-count="20">20</button>
        <button class="tempo-btn" data-count="50">50</button>
        <button class="tempo-btn" data-count="100">100</button>
      </div>
      <div id="full-instructions"></div>
      <div id="home-hint"></div>
    </div>

    <div class="flex-spacer"></div>

    <div id="nav-dot-wrap"><button id="nav-dot" type="button" aria-label="Meditations"></button></div>

    <div id="info-scrim" aria-hidden="true"></div>
    <div id="info-popup" role="dialog" aria-label="Meditation notes">
      <div id="info-drag-bar"></div>
      <div id="info-stage"></div>
      <div id="info-title"></div>
      <div id="info-subtitle"></div>
      <div class="info-block"><div class="info-heading">Aim + reflection</div><div class="info-body" id="info-notes"></div></div>
      <div class="info-block"><div class="info-heading">Detailed instructions</div><div class="info-body" id="info-detail"></div></div>
      <div class="info-block"><div class="info-heading">If You Get Stuck</div><div class="info-body" id="info-stuck"></div></div>
      <div class="info-block"><div class="info-heading">Warnings + Next Layer</div><div class="info-body" id="info-warn"></div></div>
      <div class="info-block"><div class="info-heading">Optional References</div><div class="info-body" id="info-refs"></div></div>
    </div>
  </div>

  <div id="list-screen" class="screen">
    <div id="list-header"><span>Meditations</span></div>
    <div id="list-wrap">
      <div class="group"><div class="group-title">Breath</div><div class="card-list" id="group-breath"></div></div>
      <div class="group"><div class="group-title">Elements</div><div class="card-list" id="group-elements"></div></div>
      <div class="group"><div class="group-title">Seeing</div><div class="card-list" id="group-seeing"></div></div>
    </div>
  </div>

  <a id="lattyPortal" href="bubble_home_merge_10.html" aria-label="Open bubble homepage">
    <img src="greyscale_hermesss.png" alt="" decoding="async" loading="lazy" />
  </a>
</div>

<script>
const BREATH_COUNTS = [10,20,50,100];
const MEDITATIONS = [
  {
    stage:'1',
    name:'Find the breath',
    group:'breath',
    accent:'#ef4444',
    subtitle:'Build one small, exact breath object at the nostrils or upper lip. Counting is scaffolding, not the practice itself.',
    howto:[
      'Sit upright but not rigid. Let the jaw, eyes, shoulders, and belly stop fidgeting.',
      'Pick one exact touch point: nostril rim, below the nostrils, or upper lip. Do not keep changing it mid-sit.',
      'Know only the touch of the in-breath and out-breath there. Do not follow the breath into the chest or abdomen.',
      'If attention keeps slipping, count after each full breath cycle from 1 to 8 and restart when lost.'
    ],
    good:[
      'The target zone gets smaller and clearer.',
      'Breathing stays natural.',
      'Counting helps attention but does not drown the breath.'
    ],
    bad:[
      'Chasing the breath through the body.',
      'Controlling the breathing to make it feel stronger.',
      'Adding lots of inner talk or commentary.'
    ],
    advance:'Advance when you can stay with the contact point for a decent stretch and counting starts feeling optional.',
    deepen:'Then move to long and short breath recognition without losing the same touch point.',
    links:['Part 1 · Main breath instructions','Balancing effort and steadiness']
  },
  {
    stage:'2',
    name:'Long / Short',
    group:'breath',
    accent:'#f97316',
    subtitle:'Shift from counting to direct knowing of the breath’s duration, while keeping the same tiny contact point.',
    howto:[
      'Drop the count when the mind can already stay near the breath.',
      'Use the same touch point as Meditation 1.',
      'Know whether each breath is long or short by duration, not size.',
      'Keep the recognition light. You are noticing duration, not narrating every breath.'
    ],
    good:[
      'Long or short is known almost in the background while contact stays clear.',
      'Breath length changes on its own and you simply know it.'
    ],
    bad:[
      'Secretly lengthening or shortening the breath to make the exercise easier.',
      'Over-labelling until the commentary is louder than the object.'
    ],
    advance:'Advance when duration is known cleanly and you do not need to steer the breathing.',
    deepen:'Then move to knowing the whole breath and letting it calm without interference.',
    links:['Part 1 · Long / short breath section']
  },
  {
    stage:'3',
    name:'Whole breath',
    group:'breath',
    accent:'#fbbf24',
    subtitle:'Know each whole in-breath and out-breath continuously. Let the breath become subtle without panicking or meddling.',
    howto:[
      'Stay at the same touch point but know each whole in-breath from beginning to end, then each whole out-breath from beginning to end.',
      'Make a gentle decision that the breath may calm. Then stop interfering.',
      'When the breath becomes fine, stay where it was last clearly known. Wait there. Do not gasp or deepen it to reassure yourself.',
      'If signs or images begin to appear, do not jump to them too early. Keep grounding in the breath.'
    ],
    good:[
      'The breath gets softer while the mind gets steadier and more patient.',
      'Subtlety no longer feels threatening.'
    ],
    bad:[
      'Forcing the breath to be obvious again.',
      'Getting excited by early signs or treating subtle breath as danger.'
    ],
    advance:'Advance when subtle breathing no longer throws you off the object.',
    deepen:'Then begin body-based element work with the steadier mind you have built.',
    links:['Subtle breath guidance','Nimitta caution','Balancing the five faculties']
  },
  {
    stage:'4',
    name:'Air (pushing)',
    group:'elements',
    accent:'#22c55e',
    subtitle:'Shift from one breath point to the bodily quality of pushing, pressure, movement, or thrust.',
    howto:[
      'Begin where pushing is easiest: chest movement, abdomen movement, pulse beat, or the pressure in the head with breathing.',
      'Stay with one spot until pushing is unmistakable.',
      'Move methodically to nearby regions and look again: head, neck, trunk, arms, legs, feet.',
      'Keep asking: is there actual pressure or movement here, or am I just naming a body part from memory?'
    ],
    good:[
      'Pushing can be rediscovered in more places without strain.',
      'You rely on tactile evidence rather than vague “energy” ideas.'
    ],
    bad:[
      'Doing a vague body sweep and calling it insight.',
      'Demanding something exotic instead of plain tactile movement.'
    ],
    advance:'Advance when pushing can be found through much of the body even when it is subtle.',
    deepen:'Then add the earth qualities one by one so the body becomes discriminated instead of lumped together.',
    links:['Part 2 · Four-elements overview','Detailed 12-quality method']
  },
  {
    stage:'5',
    name:'Earth (tactile)',
    group:'elements',
    accent:'#06b6d4',
    subtitle:'Build the earth-element through clear tactile qualities instead of a vague sense of “the body.”',
    howto:[
      'Hardness: lightly bite the teeth together, then relax and keep noticing the hardness that remains.',
      'Roughness: use the tongue over the teeth edge or brush a hand over the skin, then search for the same quality elsewhere.',
      'Heaviness: feel the weight of one hand on the other or the head tipping forward slightly, then extend that recognition through the body.',
      'Cycle pushing → hardness → roughness → heaviness in an orderly scan.'
    ],
    good:[
      'The qualities separate out instead of collapsing into one mushy body feeling.',
      'You can run the sequence again with similar clarity.'
    ],
    bad:[
      'Clenching muscles to manufacture hardness.',
      'Turning the exercise into concept review instead of direct perception.'
    ],

function rgba(hex, alpha){
  const h = hex.replace('#','');
  const n = parseInt(h,16);
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return `rgba(${r},${g},${b},${alpha})`;
}
function easeIn(t){ return 1 - Math.pow(1 - t, 2.2); }
function easeEx(t){ return t*t*(3-2*t)*0.6 + t*0.4; }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  }
}

const RAW_TEXT = [
`1. Find the object
There is a specific touch point at the nostrils or upper lip. The breath passes through it. Your job is to find that point and know: this is the breath.
Aim
Locate the exact place where the breath touches — either at the nostril rim or the upper lip — and stay there long enough that the mind recognises this touch as its object.
Detailed instructions

Sit upright in a posture you can hold without constant adjustment. Relax the face, jaw, shoulders, and belly. There should be no tension anywhere.
The breath passes in and out through a small zone between the nostril rims and the top of the upper lip. Do not search inside the nose, in the chest, or in the abdomen. Stay in that external zone only.
Your first job is simply to find the point where the breath is most obvious to you. It will be somewhere in that zone. For most people, it becomes a consistent spot — not chosen so much as discovered. Once found, stay there.
When the breath touches that point, know: this is the breath. That recognition — simple, clean, direct — is the practice. Not concentration on the idea of breathing. Contact with the actual touch as it happens.
Do not follow the breath inside the body. The moment attention leaves the touch point and travels inward, it has left the object.
If you cannot feel the breath at all, take a slightly deeper breath to make the touch obvious, find the spot, then return to natural breathing and stay there.
If the mind wanders, count breaths to stabilise: "in, out, one... in, out, two..." up to eight, then reset. Counting is scaffolding — use it when needed, put it down when the mind can stay on its own.

Reflection

Good practice: the touch point becomes smaller and clearer over time; the breath stays natural; there is a sense of settling at a specific location.
Bad practice: following the breath through the body, controlling or deepening the breath to make the object feel stronger, or treating the whole face as the object.
Advance when: you can return to the same touch point reliably, the mind stays there for a reasonable stretch without constant effort, and counting feels optional rather than necessary.
`,
`2. Long / short
The breath is sometimes long, sometimes short. Know its duration at the same touch point — without measuring it or steering it.
Aim
Shift from counting to direct knowing of the breath's duration, while staying at the same specific touch point.
Detailed instructions

Drop the count when the mind can stay near the breath without it. Keep the same touch point you found in Meditation 1. Do not move to a new location.
Long and short refer to duration — how long the touch lasts — not to depth, size, or force of the breath. A long breath takes more time to pass the point. A short breath takes less.
Know each breath by its duration. A light recognition is sufficient. The moment this becomes running commentary ("that one was longer than the last one"), you have left the object.
Let the breath be what it is. Do not slow it down to manufacture long breaths or speed it up to vary the experience. The natural breath is the object.
If recognition of duration becomes mechanical, return to the simpler instruction: just know the touch.

Reflection

Good practice: duration is known almost in the background while attention stays stable at the contact point.
Bad practice: deliberately altering the breath, over-labelling, or drifting from the touch point into thinking about breath patterns.
Advance when: you can know duration cleanly without losing the touch point and without steering the breathing.
`,
`3. Whole breath
Know each in-breath and each out-breath from beginning to end. When the breath becomes subtle, do not panic — stay at the point and wait.
Aim
Continuous awareness of the complete arc of each breath — beginning, middle, end — at the touch point. And the ability to stay steady when the breath becomes very fine.
Detailed instructions

Stay at the same touch point. Now know the whole in-breath as one continuous movement from when it arrives to when it stops. Then the whole out-breath the same way. The continuity matters more than verbal clarity.
As concentration deepens, the breath becomes quieter and subtler. This is normal and correct. Do not react by breathing more deeply, or by checking whether you are still breathing. Stay at the touch point and wait for the subtle breath to become perceptible there.
Pa Auk Sayadaw's instruction here is explicit: if the breath seems to have disappeared, you are not one of the rare beings who has stopped breathing. Mindfulness is simply not yet sharp enough to catch a breath that has become very fine. Keep awareness at the point.
A sign (nimitta) may begin to appear — often first as a grey or smoky patch, a feeling of warmth, or simply a stable sensation at the touch point. When this appears, do not immediately chase it. Keep knowing the breath until the mind is genuinely steady and the sign is stable on its own.
Do not try to produce calm. The instruction is to decide gently that the breathing should settle, and then do nothing else. Forced calmness breaks concentration.

Reflection

Good practice: the breath grows softer while the mind grows more patient and still.
Bad practice: forcing the breath to stay obvious, becoming excited about early signs, or treating subtlety as a problem.
Advance when: subtle breathing no longer causes you to gasp or interfere, and continuity at the touch point is stronger than the urge to meddle.
`,
`4. Air (pushing)
Shift from the breath to a different quality: pushing. Find it as a direct tactile event, not as a concept.
Aim
Recognise pushing — movement, pressure, thrust — as a bodily quality that can be found and found again through direct touch, separate from the idea of "the body."
Detailed instructions

Use the steadier mind developed through breathing to begin looking for pushing. Pushing is the most accessible of the twelve qualities in the four-elements method.
Begin where the signal is obvious: the chest expanding, the abdomen moving, the slight pressure of the head on the neck. Start with what is real and perceptible, not where it seems most impressive.
Stay with one location until pushing is genuinely clear — not named, but directly felt. Then move methodically: head, neck, chest, arms, trunk, legs, feet.
The question to ask: is there actual tactile movement, pressure, or thrust here? Or am I just naming a body part from memory and imagining the rest?
Do not rush to a whole-body sweep after one clear moment. The point is to train the recognition so it becomes reliable anywhere.

Reflection

Good practice: pushing is found through direct touch in both obvious and quiet areas of the body.
Bad practice: vague energy-sweeps, insisting on dramatic sensations, or naming body parts and calling it done.
Advance when: pushing can be found reliably through most of the body without strain, including when it is quiet.
`,
`5. Earth (tactile)
Find hardness, roughness, and heaviness as distinct tactile qualities — not as one undifferentiated lump called "the body."
Aim
Make the first three earth qualities discriminable enough that the body begins to be known as specific qualities rather than as a mass called "me."
Detailed instructions

Hardness: lightly bite the teeth together, then relax and keep noticing the hardness that remains. Extend the recognition through the body without deliberately tensing.
Roughness: rub the tongue over the edge of the teeth or brush a hand across the skin. Once the quality is clear locally, search for it elsewhere without creating it through friction.
Heaviness: place one hand on the other and feel the weight of the upper hand, or let the head tilt slightly forward and notice its heaviness. Then extend that recognition.
Alternate these with pushing: pushing → hardness → roughness → heaviness. Repetition is the instruction. This is not asking for one memorable insight. It is training discernment so it becomes reliable.
Keep the scan systematic — head to feet — rather than hopping randomly. Random scanning usually means the mind is already slipping into vagueness.

Reflection

Good practice: the four qualities become discriminable rather than collapsing into one mushy body-feeling.
Bad practice: clenching to manufacture hardness, scratching around to produce roughness, or treating the exercise as concept review rather than perception.
Advance when: you can run pushing, hardness, roughness, and heaviness through the body with real confidence.
`,
`6. Balance (opposites)
Complete the easier tactile set. Learn to correct tension, harshness, or one-sidedness by deliberately using the opposite quality.
Aim
Complete the first six earth qualities and learn to use opposites as a practical correction — not a theoretical exercise.
Detailed instructions

Supporting: let the body slump slightly forward, then straighten. The force keeping the body upright and stable is supporting. Discern it throughout the body.
Softness: press the tongue against the inside of the lip and recognise softness. Extend the search without collapsing posture.
Smoothness: wet the lips and run the tongue across them. Recognise smoothness, then look for it more broadly.
Lightness: wag one finger up and down. Notice its lightness. Train the recognition body-wide.
Now cycle all eight qualities in order. If the practice feels too hard, rough, or pressured, use the opposing quality deliberately. This is a practical tool, not decoration.

Reflection

Good practice: you can lighten, soften, or steady the practice by choosing the appropriate opposite quality rather than forcing more effort.
Bad practice: treating supporting as muscular bracing, or trying to hold all eight qualities simultaneously until everything becomes muddy.
Advance when: all eight qualities are available throughout the body and using opposites actually rebalances strain.
`,
`7. Fire / water
Complete the twelve qualities with heat, coldness, cohesion, and flowing. The last two are subtler and often inferential — that is not a defect.
Aim
Finish the complete set of twelve qualities and understand that not every quality is known in exactly the same way.
Detailed instructions

Heat: start with warmth wherever it is most obvious. This is usually straightforward.
Coldness: begin with the cool of the breath entering the nostrils on the in-breath. Extend that recognition.
Cohesion: notice how the body holds together — how skin, flesh, and sinew remain intact as a unit. Without cohesion, the body would fall apart into separate pieces. This quality is known more by inference from the fact of the body's integrity than by a raw sensation. That is correct and sufficient.
Flowing: use the movement of saliva, the flow of breath in the lungs, the spread of warmth through a limb. Again, this is often inferential. That is normal.
If cohesion and flowing are still vague, return to the previous ten qualities and strengthen them. Pa Auk's instruction: for cohesion, pushing and hardness are the most useful supports; for flowing, coldness, heat, or pushing can help.

Reflection

Good practice: you understand that the last two qualities are subtler and do not demand crude liquid sensations before counting them as found.
Bad practice: inventing anatomical imagery, demanding that cohesion feel like wetness, or concluding the practice has failed because the last two qualities are not tactile in the same way as hardness.
Advance when: all twelve qualities can be found clearly enough to work with the whole set.
`,
`8. Four elements (whole)
Regroup the twelve qualities into the four elements and hold the whole body in one calmer, unified view.
Aim
Move from sequential scanning into a steady whole-body overview where the body is known as earth, water, fire, and air — not as a shape that belongs to you.
Detailed instructions

Regroup: the first six qualities (pushing, hardness, roughness, heaviness, softness/supporting, smoothness/lightness) as earth; cohesion and flowing as water; heat and coldness as fire; supporting and pushing as air. (Note: supporting and pushing span both earth and air in some framings — stay with the qualities as actually felt rather than forcing taxonomy.)
Take the whole body in one view rather than part by part. Pa Auk suggests this is often easiest as though looking from slightly behind and above the shoulders — a light, encompassing awareness rather than a scanning beam.
Cycle earth → water → fire → air at a pace that is neither rushed nor sluggish. Too fast means nothing is really being discerned; too slow means the overview loses continuity.
Stay with the actual qualities — do not recite "earth, water, fire, air" as a chant while the mind is elsewhere.
If a quality is temporarily unclear, it may be left out, provided at least one quality per element remains and no painful imbalance results.

Reflection

Good practice: the body begins to be perceived less as a personal shape and more as a field of knowable qualities.
Bad practice: speed-reciting the elements, chasing effects, or drifting into random scanning every few breaths.
Advance when: the four-element overview is steady enough for repeated clean rounds, with clarity maintained throughout.
`,
`9. Light / transparency
Light and transparency are not rewards. They are new objects for the same discernment.
Aim
Treat any visual changes — light, whiteness, transparency — as further objects for four-element discernment, not as trophies or signs of attainment.
Detailed instructions

As concentration matures, some meditators begin to notice changes in how the body appears: a grey or smoky quality first, then white, then a body-form appearing luminous or white. These are natural developments of deepening concentration — not mystical events.
Do not become hypnotised by the visual quality. Keep discerning the four elements within the light or white form, exactly as before.
When the form appears transparent — like ice or glass — continue discerning elements there. At this stage the transparent or space element is becoming perceptible within the form.
When the transparent form begins to sparkle or emit light, sustained concentration on it may mark access concentration (upacāra-samādhi), the threshold before full absorption. Use this as a stable platform, not as a destination.
Look for the space element within the transparent form. According to Pa Auk's teaching, the body at this stage breaks down into small distinct particles — rūpa kalāpas. Your first task is to discern the four elements in those particles, not to immediately try for insight into arising and passing.

Reflection

Good practice: light and transparency make discernment sharper, not the meditator more grandiose.
Bad practice: treating lights as proof of realisation, forcing visual effects, or mistaking blank discontinuity for Nibbāna.
Advance when: you can return to this stage steadily and begin distinguishing transparent from opaque groupings without losing composure.
`,
`10. Materiality (rūpa)
Use theory to sharpen what you are directly seeing. Do not use it to replace seeing with taxonomy.
Aim
Let the theoretical structure of rūpa clarify direct observation rather than substituting for it.
Detailed instructions

Start with the basic claim: each rūpa kalāpa — the smallest perceptible material grouping — contains at minimum eight kinds of materiality: earth, water, fire, air, colour, odour, taste, and nutritive essence.
Begin distinguishing transparent-elements by which sense object impinges on them: colour impinging on the eye-base, touch on the body-base, sound on the ear-base, odour on the nose-base, taste on the tongue-base.
Work one base at a time. Do not begin with the full taxonomy of twenty-eight materialities as a memorisation task. Understand first what "materiality" is doing in the analysis and why transparent and opaque groupings matter.
Only then use the complete map of twenty-eight types so the taxonomy explains what you are looking at — rather than burying you in labels.
If perception becomes merely conceptual — you are labelling rather than seeing — step back to the whole-body four-element overview or to transparent/opaque kalāpa work. The later lists only help when anchored in actual discernment.
Pa Auk is explicit: merely seeing particles or memorising categories is not enough. Deeper analysis, causes, compactness, and the full vipassanā progression still lie ahead.

Reflection

Good practice: theory sharpens observation and observation keeps theory honest.
Bad practice: opening the taxonomy too early and replacing discernment with intellectual collection.
Advance when: the links between direct bodily observation, transparent-elements, kalāpas, and the theoretical structure are becoming intelligible rather than random.`
];

function escapeHtml(s){
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function buildInstructionsHtml(raw){
  if(!raw) return '';
  const lines = String(raw).split('\n');
  const isLinkLine = (s) => {
    const t = s.trim();
    return (
      t.startsWith('Open ') ||
      t.startsWith('See ') ||
      t.startsWith('Return ') ||
      t.startsWith('Jump ') ||
      t.startsWith('Read ') ||
      t.startsWith('Why ') ||
      t.startsWith('Balance ')
    );
  };

  const idxAim = lines.findIndex(l => l.trim().startsWith('Aim:') || l.trim() === 'Aim');
  const idxDetail = lines.findIndex(l => l.trim() === 'Detailed instructions');
  const idxRefl = lines.findIndex(l => l.trim() === 'Good practice / bad practice / advance' || l.trim() === 'Reflection');

  // If the structure isn't present, fall back to a simple pre-wrapped block.
  if(idxAim < 0 || idxDetail < 0 || idxRefl < 0) {
    const cleaned = lines.map(l => l.trimEnd()).filter(l => l.trim() && !isLinkLine(l)).join('\n');
    return `<div class="inst-p">${escapeHtml(cleaned).replace(/\n/g,'<br>')}</div>`;
  }

  const prefaceLines = lines.slice(0, idxAim)
    .map(l => l.trimEnd())
    .filter(l => l.trim() && !isLinkLine(l));

  let aimText = '';
  const aimLine = lines[idxAim].trim();
  if(aimLine.startsWith('Aim:')) {
    aimText = aimLine.replace(/^Aim:\s*/,'');
  } else {
    // Capture aim text until the detail header.
    const aimChunk = lines.slice(idxAim + 1, idxDetail)
      .map(l => l.trimEnd())
      .filter(l => l.trim() && !isLinkLine(l));
    aimText = aimChunk.join(' ');
  }

  const detailLines = lines.slice(idxDetail + 1, idxRefl)
    .map(l => l.trimEnd())
    .filter(l => l.trim() && !isLinkLine(l));
  const reflLines = lines.slice(idxRefl + 1)
    .map(l => l.trimEnd())
    .filter(l => l.trim() && !isLinkLine(l));

  const html = [];
  prefaceLines.forEach(l => html.push(`<div class="inst-p">${escapeHtml(l)}</div>`));

  html.push(`<div class="inst-aim"><span class="k">Aim</span><div class="inst-p">${escapeHtml(aimText)}</div></div>`);

  html.push('<div class="inst-h">Detailed instructions</div>');
  detailLines.forEach(l => html.push(`<div class="inst-p">${escapeHtml(l)}</div>`));

  html.push('<div class="inst-h inst-ref">Reflection</div>');
  reflLines.forEach(l => {
    const m = /^(Good practice:|Bad practice:|Advance when:)(\s*)([\s\S]*)$/.exec(l.trim());
    if(!m){
      html.push(`<div class="inst-p">${escapeHtml(l)}</div>`);
      return;
    }
    const label = m[1];
    const rest = m[3] || '';
    const cls = label.startsWith('Good') ? 'good' : (label.startsWith('Bad') ? 'bad' : 'adv');
    html.push(`<div class="inst-p"><span class="inst-tag ${cls}">${escapeHtml(label)}</span> ${escapeHtml(rest)}</div>`);
  });

  return html.join('');
}

function buildDetailOnlyHtml(raw){

function renderList(items){
  const arr = Array.isArray(items) ? items : [];
  if(!arr.length) return '—';
  return `<ul>${arr.map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>`;
}

function getAimTextFromRaw(raw){
  if(!raw) return '';
  const lines = String(raw).split('\n');
  const isLinkLine = (s) => {
    const t = s.trim();
    return (
      t.startsWith('Open ') ||
      t.startsWith('See ') ||
      t.startsWith('Return ') ||
      t.startsWith('Jump ') ||
      t.startsWith('Read ') ||
      t.startsWith('Why ') ||
      t.startsWith('Balance ')
    );
  };
  const idxAim = lines.findIndex(l => l.trim().startsWith('Aim:') || l.trim() === 'Aim');
  const idxDetail = lines.findIndex(l => l.trim() === 'Detailed instructions');
  if(idxAim < 0 || idxDetail < 0) return '';
  const aimLine = lines[idxAim].trim();
  if(aimLine.startsWith('Aim:')) return aimLine.replace(/^Aim:\s*/,'');
  const aimChunk = lines.slice(idxAim + 1, idxDetail)
    .map(l => l.trimEnd())
    .filter(l => l.trim() && !isLinkLine(l));
  return aimChunk.join(' ');
}

function setFullInstructions(){
  if(!fullInstructions) return;
  const m = MEDITATIONS[meditationIndex];
  const raw = RAW_TEXT[meditationIndex] || '';
  const aim = getAimTextFromRaw(raw);
  const steps = (m && Array.isArray(m.howto)) ? m.howto.slice(0,3) : [];

  let html = '';
  if(m && m.name) html += `<div class="inst-title">${escapeHtml(m.name)}</div>`;
  if(aim) html += `<div class="inst-aim"><span class="k">Aim</span><div class="inst-p">${escapeHtml(aim)}</div></div>`;

  for(let i=0;i<steps.length;i++){
    html += `<div class="inst-p">${escapeHtml(steps[i])}</div>`;
  }
  html += '<div class="inst-cta">tap to expand notes</div>';

  fullInstructions.innerHTML = html;
  fullInstructions.scrollTop = 0;
}

function updateCountReadout(){
  const target = breathTarget();
  countPrev.textContent = breathIndex > 0 ? BREATH_COUNTS[breathIndex - 1] : '';
  countNext.textContent = breathIndex < BREATH_COUNTS.length - 1 ? BREATH_COUNTS[breathIndex + 1] : '';
  if(sessionRunning){
    const current = Math.min(session.completed + 1, target);
    countMain.textContent = current;
    countSub.textContent = `of ${target}`;
    countProgress.textContent = session.phase;
    homeHint.textContent = 'tap to stop';
  } else {
    countMain.textContent = target;
    countSub.textContent = 'breaths';
    countProgress.textContent = sessionCompletePulse > 0 ? 'complete' : '';
    homeHint.textContent = 'choose count · hold to begin · tap for notes';
  }
  try { syncTempoButtons(); } catch (e) {}
}

let audioCtx = null;
function getAC(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
async function playClick(freq, gain, dur){
  try{
    const ac = getAC();
    if(ac.state === 'suspended') await ac.resume();
    const len = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++){
      const env = Math.exp(-i/(len*0.06));
      d[i] = (Math.random()*2-1)*env*0.7 + Math.sin(2*Math.PI*freq*i/ac.sampleRate)*env*0.3;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const filt = ac.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = freq;
    filt.Q.value = 5;
    const g = ac.createGain();
    g.gain.value = gain;
    src.connect(filt);
    filt.connect(g);
    g.connect(ac.destination);
    src.start();
    src.stop(ac.currentTime + dur);
  }catch(e){}
}
const sndStart = () => playClick(850, 0.45, 0.08);

async function playBell(){
  try{
    const ac = getAC();
    if(ac.state === 'suspended') await ac.resume();
    const t0 = ac.currentTime;

    const master = ac.createGain();
    master.gain.setValueAtTime(0.00001, t0);
    master.gain.exponentialRampToValueAtTime(0.26, t0 + 0.01);
    master.gain.exponentialRampToValueAtTime(0.00001, t0 + 3.4);
    master.connect(ac.destination);

    const lp = ac.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 5200;
    lp.Q.value = 0.6;
    lp.connect(master);

    const base = 523.25; // C5-ish
    const partials = [
      { r: 1.0, g: 0.55, d: 3.4 },
      { r: 2.706, g: 0.35, d: 2.9 },
      { r: 4.0, g: 0.18, d: 2.1 },
      { r: 5.42, g: 0.12, d: 1.7 }
    ];

    partials.forEach(p => {
      const o = ac.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(base * p.r, t0);
      try { o.detune.setValueAtTime((Math.random() * 8) - 4, t0); } catch (e) {}

      const g = ac.createGain();
      g.gain.setValueAtTime(0.00001, t0);
      g.gain.exponentialRampToValueAtTime(p.g, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.00001, t0 + p.d);

      o.connect(g);
      g.connect(lp);
      o.start(t0);
      o.stop(t0 + p.d + 0.05);
    });

    // Soft strike noise.
    const len = Math.floor(ac.sampleRate * 0.08);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++){
      const env = Math.exp(-i/(len*0.18));
      d[i] = (Math.random()*2-1) * env;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 2400;
    bp.Q.value = 0.8;
    const ng = ac.createGain();
    ng.gain.setValueAtTime(0.00001, t0);
    ng.gain.exponentialRampToValueAtTime(0.10, t0 + 0.002);
    ng.gain.exponentialRampToValueAtTime(0.00001, t0 + 0.08);
    src.connect(bp);
    bp.connect(ng);
    ng.connect(lp);
    src.start(t0);
    src.stop(t0 + 0.09);
  }catch(e){}
}

const sndFinish = () => playBell();

function populateInfo(){
  const m = MEDITATIONS[meditationIndex];
  const dd = STUDY_DEEP_DIVE[meditationIndex] || null;
  document.getElementById('info-stage').textContent = m.stage;
  document.getElementById('info-title').textContent = m.name;
  document.getElementById('info-subtitle').textContent = m.subtitle;

  const notesEl = document.getElementById('info-notes');
  const detailEl = document.getElementById('info-detail');
  const stuckEl = document.getElementById('info-stuck');
  const warnEl  = document.getElementById('info-warn');
  const refsEl  = document.getElementById('info-refs');

  if(dd){
    notesEl.innerHTML = buildAimReflectionHtml(RAW_TEXT[meditationIndex] || '');
    if(detailEl) detailEl.innerHTML = buildDetailOnlyHtml(RAW_TEXT[meditationIndex] || '');
    stuckEl.innerHTML = renderList(dd.stuck);
    warnEl.innerHTML = renderList(dd.warn);
    if(refsEl){
      const refs = Array.isArray(dd.refs) ? dd.refs : [];
      if(!refs.length){
        refsEl.innerHTML = '—';
      } else {
        refsEl.innerHTML = refs.map(r => {
          const href = (r && r.href) ? String(r.href) : '#';
          const label = (r && r.label) ? String(r.label) : href;
          return `<a class="info-chip" href="${escapeHtml(href)}">${escapeHtml(label)}</a>`;
        }).join('');
      }
    }
  } else {
    notesEl.innerHTML = '—';
    if(detailEl) detailEl.innerHTML = '—';
    stuckEl.innerHTML = '—';
    warnEl.innerHTML = '—';
    if(refsEl) refsEl.innerHTML = '—';
  }
}

function openInfo(){
  if(sessionRunning) return;
  infoOpen = true;
  populateInfo();
  if(infoScrim) infoScrim.classList.add('open');
  infoPopup.classList.add('open');
}
function closeInfo(){
  infoOpen = false;
  infoPopup.classList.remove('open');
  if(infoScrim) infoScrim.classList.remove('open');
}
function showScreen(id){ document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function startSession(){
  closeInfo();
  sessionRunning = true;
  sessionCompletePulse = 0;
  session = { phase:'inhale', t:0, completed:0, target:breathTarget() };
  sndStart();
  updateCountReadout();
}

function stopSession(markComplete=false){
  sessionRunning = false;
  session.phase = 'idle';
  session.t = 0;
  session.completed = 0;
  if(markComplete){
    sessionCompletePulse = 1;
    sndFinish();
  }
  updateCountReadout();
}

function setMeditation(index){
  meditationIndex = index;
  setAccent();
  setFullInstructions();
  populateInfo();
  document.querySelectorAll('.tech-card').forEach((card,i)=>card.classList.toggle('selected', i === index));
}

function draw(){
  const size = BASE_SIZE;
  const cx = size/2, cy = size/2;
  ctx.clearRect(0,0,size,size);

  let wave = 0;
  if(sessionRunning){
    if(session.phase === 'inhale') wave = easeIn(clamp(session.t / INHALE_DUR, 0, 1));
    else wave = 1 - easeEx(clamp(session.t / EXHALE_DUR, 0, 1));
  }

  const r = HOME_R + (MAX_R - HOME_R) * clamp(wave, 0, 1);

  // Two-pass stroke so it's always visible.
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.lineWidth = 2.8;
  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.lineWidth = 1.7;
  ctx.strokeStyle = 'rgba(255,255,255,0.86)';
  ctx.stroke();
}

function animate(ts){
  if(!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.08);
  lastTs = ts;

  if(sessionRunning){
    const dur = session.phase === 'inhale' ? INHALE_DUR : EXHALE_DUR;
    session.t += dt;
    if(session.t >= dur){
      session.t -= dur;
      if(session.phase === 'inhale'){
        session.phase = 'exhale';
      } else {
        session.completed += 1;
        if(session.completed >= session.target){
          stopSession(true);
        } else {
          session.phase = 'inhale';
        }
      }
      updateCountReadout();
    }
  }
  if(sessionCompletePulse > 0){ sessionCompletePulse = Math.max(0, sessionCompletePulse - dt * 1.25); }

  draw();
  requestAnimationFrame(animate);
}

function pointerY(e){ return e.touches ? e.touches[0].clientY : e.clientY; }
function isInteractive(el){
  if(!el || !el.closest) return false;
  return (
    el.closest('#info-popup') ||
    el.closest('#info-scrim') ||
    el.closest('#tempo-row') ||
    el.closest('#nav-dot-wrap') ||
    el.closest('#back-btn') ||
    el.closest('#dock') ||
    el.closest('#dock-picker') ||
    el.closest('#dock-scrim')
  );
}

homeScreen.addEventListener('pointerdown', e => {
  if(isInteractive(e.target)) return;
  if(sessionRunning){ stopSession(false); return; }
  pointer.down = true;
  pointer.startY = pointer.lastStepY = pointerY(e);
  pointer.moved = false;
  pointer.breathStarted = false;
  pointer.downMs = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
  clearTimeout(pointer.timer);
  pointer.timer = setTimeout(() => {
    if(pointer.down && !pointer.moved && !infoOpen){
      pointer.breathStarted = true;
      startSession();
    }
  }, 110);
});

homeScreen.addEventListener('pointermove', e => {
  if(!pointer.down || sessionRunning) return;
  const y = pointerY(e);
  const dy = y - pointer.startY;
  if(Math.abs(dy) > 14) pointer.moved = true;
  const step = Math.trunc((pointer.lastStepY - y) / 32);
  if(step !== 0){
    breathIndex = clamp(breathIndex + step, 0, BREATH_COUNTS.length - 1);
    pointer.lastStepY = y;
    clearTimeout(pointer.timer);
    updateCountReadout();
  }
});

homeScreen.addEventListener('pointerup', e => {
  if(!pointer.down) return;
  clearTimeout(pointer.timer);
  const wasMoved = pointer.moved;
  const heldMs = ((typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now()) - pointer.downMs;
  const wasBreath = pointer.breathStarted;
  pointer.down = false;
  pointer.moved = false;
  pointer.breathStarted = false;
  pointer.downMs = 0;

  if(sessionRunning) return;
  if(!wasMoved && !wasBreath && heldMs < 180){
    if(infoOpen) closeInfo(); else openInfo();
  }
});
homeScreen.addEventListener('pointercancel', () => {
  clearTimeout(pointer.timer);
  pointer.down = false; pointer.moved = false; pointer.breathStarted = false;
});

let popupStartY = 0;
infoPopup.addEventListener('touchstart', e => { popupStartY = e.touches[0].clientY; }, {passive:true});
infoPopup.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - popupStartY;
  if(dy > 70) closeInfo();
}, {passive:true});

if(infoScrim){
  const scrimClose = (e) => {
    try { e.preventDefault(); } catch (err) {}
    try { e.stopPropagation(); } catch (err) {}
    try { e.stopImmediatePropagation(); } catch (err) {}
    closeInfo();
  };
  infoScrim.addEventListener('pointerdown', scrimClose);
  infoScrim.addEventListener('mousedown', scrimClose);
  infoScrim.addEventListener('click', scrimClose);
  infoScrim.addEventListener('touchstart', scrimClose, {passive:false});
}

window.addEventListener('keydown', (e) => {
  if(e.key === 'Escape' && infoOpen) closeInfo();
});

function buildList(){
  const groups = { breath:'group-breath', elements:'group-elements', seeing:'group-seeing' };
  MEDITATIONS.forEach((m, idx) => {
    const card = document.createElement('div');
    card.className = 'tech-card';
    card.innerHTML = `
      <span class="card-dot" style="background:${m.accent}"></span>
      <div class="card-copy">
        <div class="card-stage">${m.stage}</div>
        <div class="card-name">${m.name}</div>
        <div class="card-subtitle">${m.subtitle}</div>
      </div>`;
    card.addEventListener('click', () => {
      stopSession(false);
      setMeditation(idx);
      showScreen('home-screen');
    });
    document.getElementById(groups[m.group]).appendChild(card);
  });
}

function setDockEnabled(){
  // Keep navigation available; stop session if user changes meditation.
  if(!dockPrev || !dockNext) return;
  dockPrev.disabled = false;
  dockNext.disabled = false;
}

let pickerOpen = false;
function closePicker(){
  pickerOpen = false;
  if(dockScrim) dockScrim.classList.remove('open');
  if(dockPicker) dockPicker.classList.remove('open');
  if(dockMid) dockMid.setAttribute('aria-expanded', 'false');
}
function openPicker(){
  pickerOpen = true;
  if(dockScrim) dockScrim.classList.add('open');
  if(dockPicker) dockPicker.classList.add('open');
  if(dockMid) dockMid.setAttribute('aria-expanded', 'true');
}
function togglePicker(){
  if(pickerOpen) closePicker();
  else openPicker();
}

function buildPicker(){
  if(!dockPicker) return;
  const head = document.createElement('div');
  head.className = 'picker-head';
  head.innerHTML = '<div class="k">Meditations</div><div class="h">Scroll · tap to open</div>';
  dockPicker.innerHTML = '';
  dockPicker.appendChild(head);

  MEDITATIONS.forEach((m, idx) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'picker-item';
    btn.innerHTML = `
      <div class="picker-row">
        <div class="picker-k">${m.stage}</div>
        <div>
          <div class="picker-title">${m.name}</div>
          <div class="picker-sub">${m.subtitle}</div>
        </div>
      </div>
    `;
    btn.addEventListener('click', () => {
      stopSession(false);
      closeInfo();
      setMeditation(idx);
      closePicker();
    });
    dockPicker.appendChild(btn);
  });
}

function syncTempoButtons(){
  document.querySelectorAll('.tempo-btn').forEach(btn=>{
    const n = Number(btn.getAttribute('data-count'));
    btn.classList.toggle('active', BREATH_COUNTS[breathIndex] === n);
  });
}

document.querySelectorAll('.tempo-btn').forEach(btn=>{
  btn.addEventListener('click', e=>{
    e.preventDefault();
    e.stopPropagation();
    if(sessionRunning) return;
    const n = Number(btn.getAttribute('data-count'));
    const idx = BREATH_COUNTS.indexOf(n);
    if(idx >= 0){
      breathIndex = idx;
      updateCountReadout();
      syncTempoButtons();
    }
  });
});

buildList();
setMeditation(0);
updateCountReadout();
populateInfo();

buildPicker();
setDockEnabled();

if(dockPrev){
  const goPrev = (e) => {
    e.preventDefault();
    e.stopPropagation();
    try { e.stopImmediatePropagation(); } catch (err) {}
    stopSession(false);
    closeInfo();
    const next = (meditationIndex - 1 + MEDITATIONS.length) % MEDITATIONS.length;
    setMeditation(next);
  };
  dockPrev.addEventListener('pointerdown', goPrev);
}
if(dockNext){
  const goNext = (e) => {
    e.preventDefault();
    e.stopPropagation();
    try { e.stopImmediatePropagation(); } catch (err) {}
    stopSession(false);
    closeInfo();
    const next = (meditationIndex + 1) % MEDITATIONS.length;
    setMeditation(next);
  };
  dockNext.addEventListener('pointerdown', goNext);
}
if(dockMid){
  const open = (e) => {
    e.preventDefault();
    e.stopPropagation();
    try { e.stopImmediatePropagation(); } catch (err) {}
    togglePicker();
  };
  dockMid.addEventListener('pointerdown', open);
}
if(dockScrim){
  const scrimClose = (e) => {
    try { e.preventDefault(); } catch (err) {}
    try { e.stopPropagation(); } catch (err) {}
    try { e.stopImmediatePropagation(); } catch (err) {}
    closePicker();
  };
  dockScrim.addEventListener('pointerdown', scrimClose);
}
if(dockNotes){
  const notes = (e) => {
    e.preventDefault();
    e.stopPropagation();
    try { e.stopImmediatePropagation(); } catch (err) {}
    if(sessionRunning) return;
    if(infoOpen) closeInfo(); else openInfo();
  };
  dockNotes.addEventListener('pointerdown', notes);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
